<label
  class="upload-box"
  [class.document]="mode === 'document'"
  [class.logo]="mode === 'logo'"
  [class.favicon]="mode === 'favicon'"
  [class.disabled]="disabled"
>
  <input type="file" [accept]="accept" [disabled]="disabled" (change)="onFileChange($event)" />

  @if (previewUrl && (mode === 'avatar' || mode === 'logo' || mode === 'favicon')) {
    <img [src]="previewUrl" [alt]="label" class="preview-img" />
  } @else {
    <span class="upload-icon-wrap" aria-hidden="true">
      <mat-icon fontSet="material-symbols-outlined">{{ iconName }}</mat-icon>
    </span>
    <span class="upload-label">{{ label }}</span>
    @if (mode === 'logo' || mode === 'favicon') {
      <span class="upload-hint">Click to upload</span>
    }
  }

  @if (mode === 'document' && fileName) {
    <small class="doc-sub">{{ subLabel }}</small>
  }
</label>
